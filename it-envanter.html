<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Envanter Takip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#F5F4F0;--bg2:#ECEAE4;--bg-s:#FFFFFF;--bg-c:#FFFFFF;--bg-i:#FAFAF7;--tx:#18181B;--tx2:#52524E;--tx3:#94938C;--bd:#E2E0D8;--bd2:#EDEBE5;--ac:#166534;--ac2:#22C55E;--ac-l:#DCFCE7;--ac-h:#15803D;--ac-g:rgba(22,101,52,0.07);--blue:#1D4ED8;--blue2:#3B82F6;--blue-l:#DBEAFE;--amber:#B45309;--amber2:#F59E0B;--amber-l:#FEF3C7;--red:#B91C1C;--red2:#EF4444;--red-l:#FEE2E2;--purple:#6D28D9;--purple2:#8B5CF6;--purple-l:#EDE9FE;--cyan:#0E7490;--cyan2:#06B6D4;--cyan-l:#CFFAFE;--s1:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.03);--s2:0 4px 6px rgba(0,0,0,0.04),0 10px 15px rgba(0,0,0,0.05);--s3:0 10px 25px rgba(0,0,0,0.07),0 20px 48px rgba(0,0,0,0.05);--r:10px;--r2:16px;--t:0.2s cubic-bezier(0.4,0,0.2,1)}
[data-theme="dark"]{--bg:#09090B;--bg2:#111113;--bg-s:#141416;--bg-c:#1A1A1D;--bg-i:#202023;--tx:#EDEDEC;--tx2:#A1A1A0;--tx3:#5A5A58;--bd:#27272A;--bd2:#1F1F22;--ac:#4ADE80;--ac2:#22C55E;--ac-l:rgba(74,222,128,0.1);--ac-h:#86EFAC;--ac-g:rgba(74,222,128,0.06);--blue:#60A5FA;--blue2:#3B82F6;--blue-l:rgba(96,165,250,0.1);--amber:#FBBF24;--amber2:#F59E0B;--amber-l:rgba(251,191,36,0.1);--red:#F87171;--red2:#EF4444;--red-l:rgba(248,113,113,0.1);--purple:#A78BFA;--purple2:#8B5CF6;--purple-l:rgba(167,139,250,0.1);--cyan:#22D3EE;--cyan2:#06B6D4;--cyan-l:rgba(34,211,238,0.1);--s1:0 1px 3px rgba(0,0,0,0.3);--s2:0 4px 12px rgba(0,0,0,0.4);--s3:0 12px 40px rgba(0,0,0,0.5)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;transition:background 0.4s,color 0.4s}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
[data-theme="dark"] body::after{opacity:0.04}
.app{display:grid;grid-template-columns:240px 1fr;height:100vh}
.sidebar{background:var(--bg-s);border-right:1px solid var(--bd2);display:flex;flex-direction:column}
[data-theme="dark"] .sidebar{background:rgba(20,20,22,0.8);backdrop-filter:blur(20px)}
.sidebar-logo{padding:24px 22px 20px;display:flex;align-items:center;gap:11px}
.logo-mark{width:36px;height:36px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center}
[data-theme="dark"] .logo-mark{background:linear-gradient(135deg,#4ADE80,#22C55E);box-shadow:0 4px 16px rgba(74,222,128,0.25)}
.logo-mark svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
.logo-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;letter-spacing:-0.3px}
.logo-sub{font-size:10px;color:var(--tx3);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.nav{padding:8px 12px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;padding:16px 12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--tx2);transition:all var(--t);margin-bottom:2px}
.nav-item:hover{background:var(--ac-g);color:var(--tx)}
.nav-item.active{background:var(--ac-g);color:var(--ac);font-weight:600}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:0.7;fill:none;stroke:currentColor;stroke-width:2}
.nav-item.active svg{opacity:1}
.nav-count{margin-left:auto;font-size:11px;font-weight:600;background:var(--bg2);padding:2px 8px;border-radius:10px;color:var(--tx3)}
.nav-item.active .nav-count{background:var(--ac-l);color:var(--ac)}
.sidebar-bottom{padding:16px;border-top:1px solid var(--bd2);display:flex;gap:8px}
.sb-btn{flex:1;padding:9px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg-c);color:var(--tx2);font:12px 'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:all var(--t)}
.sb-btn:hover{border-color:var(--ac);color:var(--ac)}
.main{overflow-y:auto;padding:28px 32px 40px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Outfit',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.5px}
.page-title span{color:var(--tx3);font-weight:400;font-size:16px;margin-left:6px}
.header-actions{display:flex;gap:8px}
.hbtn{padding:9px 20px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg-c);color:var(--tx2);font:13px 'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all var(--t);font-weight:500}
.hbtn:hover{border-color:var(--ac);color:var(--ac)}
.hbtn.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
[data-theme="dark"] .hbtn.primary{background:linear-gradient(135deg,#4ADE80,#22C55E);color:#09090B}
.hbtn.primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,0.3)}
.theme-btn{width:38px;height:38px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg-c);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.theme-btn:hover{border-color:var(--ac);color:var(--ac)}
.dashboard{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg-c);border:1px solid var(--bd2);border-radius:var(--r2);padding:20px;box-shadow:var(--s1);transition:all var(--t);position:relative;overflow:hidden}
[data-theme="dark"] .stat-card{background:rgba(26,26,29,0.6);backdrop-filter:blur(12px);border-color:var(--bd)}
.stat-card:hover{box-shadow:var(--s2);transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r2) var(--r2) 0 0}
.stat-card.c-green::before{background:var(--ac2)}.stat-card.c-blue::before{background:var(--blue2)}.stat-card.c-amber::before{background:var(--amber2)}.stat-card.c-red::before{background:var(--red2)}.stat-card.c-purple::before{background:var(--purple2)}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.stat-icon.green{background:var(--ac-l);color:var(--ac)}.stat-icon.blue{background:var(--blue-l);color:var(--blue)}.stat-icon.amber{background:var(--amber-l);color:var(--amber)}.stat-icon.red{background:var(--red-l);color:var(--red)}.stat-icon.purple{background:var(--purple-l);color:var(--purple)}
.stat-label{font-size:12px;color:var(--tx3);margin-bottom:4px;font-weight:500}
.stat-value{font-family:'Outfit',sans-serif;font-size:28px;font-weight:700;line-height:1}
.stat-value.green{color:var(--ac)}.stat-value.blue{color:var(--blue)}.stat-value.amber{color:var(--amber)}.stat-value.red{color:var(--red)}.stat-value.purple{color:var(--purple)}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:6px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.chart-card{background:var(--bg-c);border:1px solid var(--bd2);border-radius:var(--r2);padding:22px;box-shadow:var(--s1)}
[data-theme="dark"] .chart-card{background:rgba(26,26,29,0.6);backdrop-filter:blur(12px);border-color:var(--bd)}
.chart-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin-bottom:16px}
.chart-container{position:relative;height:220px}
.alerts{margin-bottom:20px}
.alert{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:var(--r);margin-bottom:6px;font-size:13px}
.alert.warn{background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,0.15)}
.alert.danger{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,0.15)}
.alert svg{width:16px;height:16px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--tx3);fill:none;stroke-width:2}
.search-box{width:100%;padding:10px 14px 10px 40px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg-c);color:var(--tx);font:14px 'DM Sans',sans-serif;outline:none;transition:all var(--t)}
.search-box:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-g)}
.filter-select{padding:10px 14px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg-c);color:var(--tx);font:13px 'DM Sans',sans-serif;outline:none;cursor:pointer}
.table-wrap{background:var(--bg-c);border:1px solid var(--bd2);border-radius:var(--r2);overflow:hidden;box-shadow:var(--s1)}
[data-theme="dark"] .table-wrap{background:rgba(26,26,29,0.6);backdrop-filter:blur(12px);border-color:var(--bd)}
table{width:100%;border-collapse:collapse}
th{padding:13px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--bd2);background:var(--bg-i)}
[data-theme="dark"] th{background:rgba(255,255,255,0.02)}
td{padding:14px 16px;font-size:13px;border-bottom:1px solid var(--bd2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr{transition:background var(--t)}tr:hover td{background:var(--ac-g)}
tr.deleting{animation:row-out 0.3s ease forwards}
@keyframes row-out{to{opacity:0;transform:translateX(-20px)}}
.dev-info{display:flex;align-items:center;gap:12px}
.dev-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dev-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.dev-icon.bilgisayar{background:var(--blue-l);color:var(--blue)}.dev-icon.yazici{background:var(--purple-l);color:var(--purple)}.dev-icon.monitor{background:var(--cyan-l);color:var(--cyan)}.dev-icon.ag{background:var(--amber-l);color:var(--amber)}.dev-icon.diger{background:var(--ac-l);color:var(--ac)}
.dev-name{font-weight:600;font-size:13.5px}.dev-sub{font-size:11px;color:var(--tx3);margin-top:2px}.dev-serial{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);margin-top:1px}
.age-wrap{display:flex;align-items:center;gap:8px}
.age-bar-bg{width:60px;height:5px;background:var(--bd2);border-radius:3px;overflow:hidden}
.age-bar{height:100%;border-radius:3px;transition:width 0.5s}
.age-label{font-size:11px;color:var(--tx3);white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%}
.badge.green{background:var(--ac-l);color:var(--ac)}.badge.green::before{background:var(--ac2)}
.badge.blue{background:var(--blue-l);color:var(--blue)}.badge.blue::before{background:var(--blue2)}
.badge.amber{background:var(--amber-l);color:var(--amber)}.badge.amber::before{background:var(--amber2)}
.badge.red{background:var(--red-l);color:var(--red)}.badge.red::before{background:var(--red2)}
.badge.purple{background:var(--purple-l);color:var(--purple)}.badge.purple::before{background:var(--purple2)}
.cost-cell{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500}
.row-actions{display:flex;gap:3px}
.row-btn{width:32px;height:32px;border:none;border-radius:8px;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.row-btn:hover{background:var(--ac-g);color:var(--ac)}
.row-btn.danger:hover{background:var(--red-l);color:var(--red)}
.row-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.empty-table{padding:60px 20px;text-align:center;color:var(--tx3)}
.empty-table h3{font-family:'Outfit',sans-serif;font-size:18px;color:var(--tx2);margin-bottom:6px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:center}
[data-theme="dark"] .modal-overlay{background:rgba(0,0,0,0.7)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-c);border:1px solid var(--bd);border-radius:20px;padding:30px;width:560px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:var(--s3);animation:modal-in 0.3s ease}
[data-theme="dark"] .modal{background:rgba(26,26,29,0.95);backdrop-filter:blur(24px);border-color:var(--bd)}
@keyframes modal-in{from{opacity:0;transform:scale(0.95) translateY(12px)}}
.modal h2{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;margin-bottom:22px}
.form-section{font-size:11px;font-weight:600;color:var(--ac);text-transform:uppercase;letter-spacing:0.8px;margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--bd2)}
.form-section:first-of-type{border-top:none;margin-top:0;padding-top:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row label{display:block;font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:5px}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg-i);color:var(--tx);font:14px 'DM Sans',sans-serif;outline:none;transition:all var(--t)}
.form-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-g)}
textarea.form-input{resize:vertical}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--bd2)}
.form-btn{padding:10px 26px;border-radius:var(--r);font:14px 'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all var(--t);border:1px solid var(--bd)}
.form-btn.cancel{background:transparent;color:var(--tx2)}.form-btn.cancel:hover{border-color:var(--tx3)}
.form-btn.save{background:var(--ac);color:#fff;border-color:var(--ac)}.form-btn.save:hover{opacity:0.9}
[data-theme="dark"] .form-btn.save{background:linear-gradient(135deg,#4ADE80,#22C55E);color:#09090B}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;background:var(--bg-c);border:1px solid var(--bd);border-radius:var(--r);font-size:13px;box-shadow:var(--s3);z-index:300;transition:transform 0.35s,opacity 0.35s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
[data-theme="dark"] .toast{border-color:var(--ac);color:var(--ac)}
.page{display:none}.page.active{display:block}
@media(max-width:1100px){.dashboard{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:768px){.app{grid-template-columns:1fr}.sidebar{display:none}.dashboard{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="sidebar-logo"><div class="logo-mark"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div><div class="logo-text">IT Envanter</div><div class="logo-sub">Takip Sistemi</div></div></div>
<div class="nav">
<div class="nav-label">Genel</div>
<div class="nav-item active" onclick="setPage('dashboard',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</div>
<div class="nav-item" onclick="setPage('inventory',this)"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Envanter<span class="nav-count" id="nav-count">0</span></div>
<div class="nav-label">Kategoriler</div>
<div class="nav-item" onclick="setPage('inventory',this);setFilter('bilgisayar')"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Bilgisayar</div>
<div class="nav-item" onclick="setPage('inventory',this);setFilter('yazici')"><svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Yazıcı</div>
<div class="nav-item" onclick="setPage('inventory',this);setFilter('monitor')"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Monitör</div>
<div class="nav-item" onclick="setPage('inventory',this);setFilter('ag')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49"/></svg>Ağ Cihazı</div>
</div>
<div class="sidebar-bottom"><button class="sb-btn" onclick="exportData()">📦 Dışa Aktar</button><button class="sb-btn" onclick="document.getElementById('imp').click()">📥 İçe Aktar</button><input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)"></div>
</div>
<div class="main">
<div class="page-header"><div class="page-title" id="page-title">Dashboard</div><div class="header-actions"><button class="hbtn primary" onclick="openModal()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Cihaz Ekle</button><button class="theme-btn" onclick="toggleTheme()"><svg id="ic-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg id="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button></div></div>
<div class="page active" id="page-dashboard">
<div class="dashboard" id="dashboard"></div>
<div class="alerts" id="alerts"></div>
<div class="charts-row"><div class="chart-card"><div class="chart-title">Kategori Dağılımı</div><div class="chart-container"><canvas id="chart-cat"></canvas></div></div><div class="chart-card"><div class="chart-title">Durum Dağılımı</div><div class="chart-container"><canvas id="chart-status"></canvas></div></div></div>
</div>
<div class="page" id="page-inventory">

<div class="modal-overlay" id="modal-o" onclick="if(event.target===this)closeModal()"><div class="modal"><h2 id="modal-title">Yeni Cihaz Ekle</h2><div class="form-section">Cihaz Bilgileri</div><div class="form-grid"><div class="form-row"><label>Cihaz Adı *</label><input class="form-input" id="f-name" placeholder="Dell Latitude 5520"></div><div class="form-row"><label>Tür</label><select class="form-input" id="f-type"><option value="bilgisayar">Bilgisayar</option><option value="yazici">Yazıcı</option><option value="monitor">Monitör</option><option value="ag">Ağ Cihazı</option><option value="diger">Diğer</option></select></div><div class="form-row"><label>Marka</label><input class="form-input" id="f-brand"></div><div class="form-row"><label>Model</label><input class="form-input" id="f-model"></div><div class="form-row"><label>Seri No</label><input class="form-input" id="f-serial"></div><div class="form-row"><label>Durum</label><select class="form-input" id="f-status"><option value="aktif">Aktif</option><option value="bakimda">Bakımda</option><option value="depo">Depoda</option><option value="arizali">Arızalı</option><option value="emekli">Emekli</option></select></div></div><div class="form-section">Atama & Maliyet</div><div class="form-grid"><div class="form-row"><label>Atanan Kişi</label><input class="form-input" id="f-assignee"></div><div class="form-row"><label>Departman</label><input class="form-input" id="f-dept"></div><div class="form-row"><label>Fiyat (₺)</label><input class="form-input" id="f-cost" type="number"></div><div class="form-row"><label>Satın Alma Tarihi</label><input class="form-input" id="f-purchase" type="date"></div></div><div class="form-section">Garanti & Bakım</div><div class="form-grid"><div class="form-row"><label>Garanti Bitiş</label><input class="form-input" id="f-warranty" type="date"></div><div class="form-row"><label>Son Bakım</label><input class="form-input" id="f-maint" type="date"></div><div class="form-row"><label>Sonraki Bakım</label><input class="form-input" id="f-next" type="date"></div></div><div class="form-row" style="margin-top:12px"><label>Notlar</label><textarea class="form-input" id="f-notes" rows="2"></textarea></div><div class="form-actions"><button class="form-btn cancel" onclick="closeModal()">İptal</button><button class="form-btn save" onclick="saveDevice()">Kaydet</button></div></div></div>

<script>
let devices=[],editId=null,currentPage='dashboard';
const TL={bilgisayar:'Bilgisayar',yazici:'Yazıcı',monitor:'Monitör',ag:'Ağ Cihazı',diger:'Diğer'};
const SC={aktif:{l:'Aktif',c:'green'},bakimda:{l:'Bakımda',c:'amber'},depo:{l:'Depoda',c:'blue'},arizali:{l:'Arızalı',c:'red'},emekli:{l:'Emekli',c:'purple'}};
const TI={bilgisayar:'<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',yazici:'<svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',monitor:'<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',ag:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49"/></svg>',diger:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>'};
function save(){localStorage.setItem('it3',JSON.stringify(devices))}
function load(){try{devices=JSON.parse(localStorage.getItem('it3')||'[]')}catch(e){devices=[]}}
function setPage(p,el){currentPage=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');if(el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active')}document.getElementById('page-title').innerHTML=p==='dashboard'?'Dashboard':'Envanter<span>'+devices.length+' cihaz</span>';if(p==='dashboard')renderDash();else renderTable()}
function setFilter(t){document.getElementById('filter-type').value=t;renderTable()}
function renderAll(){renderDash();renderTable();document.getElementById('nav-count').textContent=devices.length}
let cC=null,cS=null;
function renderDash(){
const t=devices.length,a=devices.filter(d=>d.status==='aktif').length,b=devices.filter(d=>d.status==='bakimda').length,r=devices.filter(d=>d.status==='arizali').length,tc=devices.reduce((s,d)=>s+(parseFloat(d.cost)||0),0);
document.getElementById('dashboard').innerHTML=`
<div class="stat-card c-green"><div class="stat-icon green"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="stat-label">Toplam Cihaz</div><div class="stat-value green">${t}</div></div>
<div class="stat-card c-blue"><div class="stat-icon blue"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="stat-label">Aktif</div><div class="stat-value blue">${a}</div><div class="stat-sub">${t?Math.round(a/t*100):0}%</div></div>
<div class="stat-card c-amber"><div class="stat-icon amber"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></div><div class="stat-label">Bakımda</div><div class="stat-value amber">${b}</div></div>
<div class="stat-card c-red"><div class="stat-icon red"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div class="stat-label">Arızalı</div><div class="stat-value red">${r}</div></div>
<div class="stat-card c-purple"><div class="stat-icon purple"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div class="stat-label">Toplam Değer</div><div class="stat-value purple">${fc(tc)}</div><div class="stat-sub">₺</div></div>`;
renderAlerts();renderCharts()}
function renderAlerts(){const today=new Date(),mo=new Date(today.getTime()+30*864e5);const al=[];devices.forEach(d=>{if(d.warranty){const w=new Date(d.warranty);if(w<today)al.push({t:'danger',m:d.name+' — garanti dolmuş'});else if(w<mo)al.push({t:'warn',m:d.name+' — garanti '+fd(d.warranty)+' bitiyor'})}if(d.nextMaintenance){const m=new Date(d.nextMaintenance);if(m<today)al.push({t:'danger',m:d.name+' — bakım gecikmiş'});else if(m<mo)al.push({t:'warn',m:d.name+' — bakım '+fd(d.nextMaintenance)})}});
document.getElementById('alerts').innerHTML=al.slice(0,4).map(a=>'<div class="alert '+a.t+'"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'+a.m+'</div>').join('')}
function renderCharts(){const dk=document.documentElement.getAttribute('data-theme')==='dark';const gc=dk?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';const tc=dk?'#A1A1A0':'#52524E';
const cats={};devices.forEach(d=>{cats[d.type]=(cats[d.type]||0)+1});
if(cC)cC.destroy();cC=new Chart(document.getElementById('chart-cat'),{type:'doughnut',data:{labels:Object.keys(cats).map(k=>TL[k]||k),datasets:[{data:Object.values(cats),backgroundColor:Object.keys(cats).map(k=>({bilgisayar:'#3B82F6',yazici:'#8B5CF6',monitor:'#06B6D4',ag:'#F59E0B',diger:'#22C55E'}[k]||'#999')),borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:tc,font:{family:'DM Sans',size:12},padding:16,usePointStyle:true,pointStyleWidth:8}}}}});
const ss=['aktif','bakimda','depo','arizali','emekli'];
if(cS)cS.destroy();cS=new Chart(document.getElementById('chart-status'),{type:'bar',data:{labels:ss.map(s=>SC[s].l),datasets:[{data:ss.map(s=>devices.filter(d=>d.status===s).length),backgroundColor:['#22C55ECC','#F59E0BCC','#3B82F6CC','#EF4444CC','#8B5CF6CC'],borderRadius:8,borderSkipped:false,barThickness:36}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:tc,font:{family:'DM Sans',size:11},stepSize:1},grid:{color:gc}},x:{ticks:{color:tc,font:{family:'DM Sans',size:12}},grid:{display:false}}}}})}
function renderTable(){const q=document.getElementById('search').value.toLowerCase();const tf=document.getElementById('filter-type').value;const sf=document.getElementById('filter-status').value;const sort=document.getElementById('filter-sort').value;
let list=devices.filter(d=>{const txt=(d.name+' '+d.brand+' '+d.model+' '+d.serial+' '+d.assignee+' '+d.dept+' '+d.notes).toLowerCase();return txt.includes(q)&&(!tf||d.type===tf)&&(!sf||d.status===sf)});
list.sort((a,b)=>{if(sort==='name')return(a.name||'').localeCompare(b.name||'');if(sort==='cost-desc')return(parseFloat(b.cost)||0)-(parseFloat(a.cost)||0);if(sort==='cost-asc')return(parseFloat(a.cost)||0)-(parseFloat(b.cost)||0);if(sort==='warranty')return(a.warranty||'9').localeCompare(b.warranty||'9');return(b.updatedAt||'').localeCompare(a.updatedAt||'')});
const tb=document.getElementById('tbody'),em=document.getElementById('empty-t');
if(!list.length){tb.innerHTML='';em.style.display='block';return}em.style.display='none';
tb.innerHTML=list.map(d=>{const sc=SC[d.status]||SC.aktif;const age=getAge(d.purchase);const ac=age.y>=4?'var(--red2)':age.y>=2?'var(--amber2)':'var(--ac2)';const ap=Math.min(age.y/5*100,100);
return'<tr data-id="'+d.id+'"><td><div class="dev-info"><div class="dev-icon '+d.type+'">'+(TI[d.type]||TI.diger)+'</div><div><div class="dev-name">'+(d.name||'—')+'</div><div class="dev-sub">'+[d.brand,d.model].filter(Boolean).join(' · ')+'</div>'+(d.serial?'<div class="dev-serial">'+d.serial+'</div>':'')+'</div></div></td><td><span class="badge '+sc.c+'">'+sc.l+'</span></td><td>'+(d.assignee?'<div style="font-weight:500">'+d.assignee+'</div><div style="font-size:11px;color:var(--tx3)">'+(d.dept||'')+'</div>':'<span style="color:var(--tx3)">—</span>')+'</td><td class="cost-cell">'+(d.cost?fc(d.cost)+' ₺':'<span style="color:var(--tx3)">—</span>')+'</td><td>'+(d.purchase?'<div class="age-wrap"><div class="age-bar-bg"><div class="age-bar" style="width:'+ap+'%;background:'+ac+'"></div></div><div class="age-label">'+age.t+'</div></div>':'<span style="color:var(--tx3)">—</span>')+'</td><td>'+wl(d.warranty)+'</td><td><div class="row-actions"><button class="row-btn" onclick="editDevice(\''+d.id+'\')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="row-btn danger" onclick="deleteDevice(\''+d.id+'\')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></td></tr>'}).join('')}
function getAge(p){if(!p)return{y:0,t:'—'};const d=(Date.now()-new Date(p).getTime())/(365.25*864e5);if(d<1){const m=Math.floor(d*12);return{y:d,t:m+' ay'}}return{y:d,t:Math.floor(d)+'y '+Math.floor((d%1)*12)+'a'}}
function wl(w){if(!w)return'<span style="color:var(--tx3)">—</span>';const d=Math.floor((new Date(w)-Date.now())/864e5);if(d<0)return'<span class="badge red">Dolmuş</span>';if(d<30)return'<span class="badge amber">'+d+' gün</span>';if(d<365)return'<span class="badge blue">'+Math.floor(d/30)+' ay</span>';return'<span style="color:var(--tx2)">'+fd(w)+'</span>'}
function fc(n){return Number(n).toLocaleString('tr-TR',{maximumFractionDigits:0})}
function fd(d){return d?new Date(d).toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'}):'—'}
function openModal(id){editId=id||null;document.getElementById('modal-title').textContent=editId?'Cihaz Düzenle':'Yeni Cihaz Ekle';const fs=['f-name','f-type','f-brand','f-model','f-serial','f-status','f-assignee','f-dept','f-cost','f-purchase','f-warranty','f-maint','f-next','f-notes'];if(editId){const d=devices.find(x=>x.id===editId);if(d){document.getElementById('f-name').value=d.name||'';document.getElementById('f-type').value=d.type||'bilgisayar';document.getElementById('f-brand').value=d.brand||'';document.getElementById('f-model').value=d.model||'';document.getElementById('f-serial').value=d.serial||'';document.getElementById('f-status').value=d.status||'aktif';document.getElementById('f-assignee').value=d.assignee||'';document.getElementById('f-dept').value=d.dept||'';document.getElementById('f-cost').value=d.cost||'';document.getElementById('f-purchase').value=d.purchase||'';document.getElementById('f-warranty').value=d.warranty||'';document.getElementById('f-maint').value=d.maintenance||'';document.getElementById('f-next').value=d.nextMaintenance||'';document.getElementById('f-notes').value=d.notes||''}}else{fs.forEach(f=>{const el=document.getElementById(f);if(el.tagName==='SELECT')el.selectedIndex=0;else el.value=''})}document.getElementById('modal-o').classList.add('open')}
function closeModal(){document.getElementById('modal-o').classList.remove('open');editId=null}
function saveDevice(){const n=document.getElementById('f-name').value.trim();if(!n){toast('Cihaz adı zorunlu');return}const data={name:n,type:document.getElementById('f-type').value,brand:document.getElementById('f-brand').value.trim(),model:document.getElementById('f-model').value.trim(),serial:document.getElementById('f-serial').value.trim(),status:document.getElementById('f-status').value,assignee:document.getElementById('f-assignee').value.trim(),dept:document.getElementById('f-dept').value.trim(),cost:document.getElementById('f-cost').value,purchase:document.getElementById('f-purchase').value,warranty:document.getElementById('f-warranty').value,maintenance:document.getElementById('f-maint').value,nextMaintenance:document.getElementById('f-next').value,notes:document.getElementById('f-notes').value.trim(),updatedAt:new Date().toISOString()};if(editId){const i=devices.findIndex(d=>d.id===editId);if(i>=0)devices[i]={...devices[i],...data};toast('Güncellendi')}else{data.id=Date.now().toString();data.createdAt=new Date().toISOString();devices.unshift(data);toast('Eklendi')}save();closeModal();renderAll()}
function editDevice(id){openModal(id)}
function deleteDevice(id){const row=document.querySelector('tr[data-id="'+id+'"]');if(row){row.classList.add('deleting');setTimeout(()=>{devices=devices.filter(d=>d.id!==id);save();renderAll();toast('Silindi')},300)}}
function exportData(){const b=new Blob([JSON.stringify({itInventory:devices,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='it-envanter_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Dışa aktarıldı')}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const im=d.itInventory||d;if(Array.isArray(im)){devices=[...im,...devices];save();renderAll();toast(im.length+' cihaz aktarıldı')}}catch{toast('Geçersiz dosya')}};r.readAsText(f);e.target.value=''}
function toggleTheme(){const dk=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',dk?'light':'dark');localStorage.setItem('it_t',dk?'light':'dark');document.getElementById('ic-sun').style.display=dk?'block':'none';document.getElementById('ic-moon').style.display=dk?'none':'block';if(currentPage==='dashboard')setTimeout(renderCharts,50)}
function loadTheme(){const t=localStorage.getItem('it_t')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('ic-sun').style.display=t==='light'?'block':'none';document.getElementById('ic-moon').style.display=t==='dark'?'block':'none'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
loadTheme();load();
if(!devices.length){devices=[

{id:'d2',name:'HP LaserJet Pro M404',type:'yazici',brand:'HP',model:'LaserJet Pro M404dn',serial:'HP-2023-014',status:'aktif',assignee:'',dept:'Ortak — Kat 2',cost:'18500',purchase:'2023-06-20',warranty:'2025-06-20',maintenance:'2025-02-15',nextMaintenance:'2025-08-15',notes:'Duplex, ağ bağlantılı',createdAt:'2023-06-20T10:00:00Z',updatedAt:'2025-02-15T10:00:00Z'},
{id:'d3',name:'LG 27UK850-W',type:'monitor',brand:'LG',model:'27UK850-W',serial:'LG-2024-008',status:'depo',assignee:'',dept:'',cost:'14200',purchase:'2024-08-10',warranty:'2026-08-10',maintenance:'',nextMaintenance:'',notes:'4K IPS, USB-C',createdAt:'2024-08-10T10:00:00Z',updatedAt:'2024-08-10T10:00:00Z'},
{id:'d4',name:'Cisco Catalyst 2960-X',type:'ag',brand:'Cisco',model:'WS-C2960X-48FPS-L',serial:'CS-2022-003',status:'aktif',assignee:'Sunucu Odası',dept:'IT',cost:'85000',purchase:'2022-01-05',warranty:'2025-01-05',maintenance:'2024-12-20',nextMaintenance:'2025-06-20',notes:'48 port PoE+',createdAt:'2022-01-05T10:00:00Z',updatedAt:'2024-12-20T10:00:00Z'},
{id:'d5',name:'Lenovo ThinkPad T14',type:'bilgisayar',brand:'Lenovo',model:'ThinkPad T14 Gen 4',serial:'LN-2024-022',status:'arizali',assignee:'Ayşe Demir',dept:'Pazarlama',cost:'48000',purchase:'2024-05-20',warranty:'2026-05-20',maintenance:'2025-03-01',nextMaintenance:'',notes:'Ekran arızası',createdAt:'2024-05-20T10:00:00Z',updatedAt:'2025-03-01T10:00:00Z'},

{id:'d8',name:'Brother MFC-L8900CDW',type:'yazici',brand:'Brother',model:'MFC-L8900CDW',serial:'BR-2024-005',status:'bakimda',assignee:'',dept:'Ortak — Kat 1',cost:'32000',purchase:'2024-02-14',warranty:'2026-02-14',maintenance:'2025-03-20',nextMaintenance:'2025-04-30',notes:'Toner değişimi bekleniyor',createdAt:'2024-02-14T10:00:00Z',updatedAt:'2025-03-20T10:00:00Z'}
];save()}
renderAll();
